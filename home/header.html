<!-- ── Side Menu Overlay ── -->
<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

<!-- ── Side Menu Panel ── -->
<div class="side-menu" id="sideMenu">
  <div class="menu-header">
    <div class="menu-avatar">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div class="menu-player-info">
      <div class="menu-name"  id="menuPlayerName">Rahul K.</div>
      <div class="menu-level" id="menuPlayerLevel">&#9733; Gold Level</div>
    </div>
    <div class="menu-close" onclick="closeMenu()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
  </div>

  <div class="menu-divider"></div>

  <div class="menu-items">
    <div class="menu-item" onclick="menuNav('My Profile')">
      <div class="menu-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span>My Profile</span>
      <div class="menu-arrow">&#8250;</div>
    </div>

    <div class="menu-item" onclick="menuNav('Settings')">
      <div class="menu-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
      <span>Settings</span>
      <div class="menu-arrow">&#8250;</div>
    </div>

    <div class="menu-item" onclick="menuNav('Transaction History')">
      <div class="menu-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      </div>
      <span>Transaction History</span>
      <div class="menu-arrow">&#8250;</div>
    </div>

    <div class="menu-item" onclick="menuNav('Refer & Earn')">
      <div class="menu-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </div>
      <span>Refer &amp; Earn</span>
      <div class="menu-arrow">&#8250;</div>
    </div>

    <div class="menu-item" onclick="menuNav('Help & Support')">
      <div class="menu-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <span>Help &amp; Support</span>
      <div class="menu-arrow">&#8250;</div>
    </div>

    <div class="menu-item" onclick="menuNav('About')">
      <div class="menu-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <span>About</span>
      <div class="menu-arrow">&#8250;</div>
    </div>
  </div>

  <div class="menu-divider"></div>

  <div class="menu-item menu-logout" onclick="menuNav('Logout')">
    <div class="menu-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </div>
    <span>Logout</span>
  </div>
</div>

<!-- ── Main Header Bar ── -->
<div class="header">
  <div class="header-brand">
    <span class="brand-suit">♠</span>
    <span class="brand-name">Patti King</span>
    <span class="brand-suit">♠</span>
  </div>
  <div class="header-row">
    <div class="header-left">
      <div class="avatar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="player-info">
        <div class="player-name"  id="headerPlayerName">Rahul K.</div>
        <div class="player-level" id="headerPlayerLevel">&#9733; Gold Level</div>
      </div>
    </div>

    <div class="header-right">
      <!-- Balance Chip -->
      <div class="balance-chip">
        <span class="coin-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 3v2M12 19v2M3 12h2M19 12h2"/>
          </svg>
        </span>
        <span class="amount" id="balanceAmt">2,450</span>
        <div class="reload-btn" onclick="goToWallet()" title="Add Fund">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </div>
      </div>

      <!-- Notification Button -->
      <div class="notif-btn" onclick="openNotif()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <div class="notif-dot" id="notifDot"></div>
      </div>

      <!-- Hamburger Menu Button -->
      <div class="menu-btn" onclick="openMenu()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </div>
    </div>
  </div>
</div>
